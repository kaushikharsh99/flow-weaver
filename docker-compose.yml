version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-db:/workspace/apps/api
    environment:
      - PORT=8000
      - DATABASE_URL=sqlite:///./flow_weaver.db
    restart: always

  frontend:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VITE_USE_MOCK_API=false
      - VITE_API_URL=http://localhost:8000/api
    depends_on:
      - backend
    restart: always

volumes:
  backend-db:
